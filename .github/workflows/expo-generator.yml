name: Generate Expo App

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Expo project folder
        run: mkdir -p innovacion-mobile

      - name: Add Expo template files
        run: |
          cd innovacion-mobile

          cat > app.json << 'EOT'
          {
            "expo": {
              "name": "innovacion-mobile",
              "slug": "innovacion-mobile",
              "version": "1.0.0",
              "sdkVersion": "56.0.0",
              "runtimeVersion": {
                "policy": "sdkVersion"
              }
            }
          }
          EOT

          cat > eas.json << 'EOT'
          {
            "build": {
              "android": {
                "buildType": "apk"
              }
            }
          }
          EOT

          cat > package.json << 'EOT'
          {
            "name": "innovacion-mobile",
            "version": "1.0.0",
            "main": "App.js",
            "scripts": {
              "start": "expo start"
            },
            "dependencies": {
              "expo": "~56.0.0",
              "react": "18.2.0",
              "react-native": "0.76.0"
            }
          }
          EOT

          cat > App.js << 'EOT'
          import { Text, View } from 'react-native';
          export default function App() {
            return (
              <View style={{ flex: 1, alignItems: 'center', justifyContent: 'center' }}>
                <Text>Innovacion Mobile</Text>
              </View>
            );
          }
          EOT

      - name: Commit generated files
        run: |
          git config user.name "ACSERNE"
          git config user.email "actions@github.com"
          git add innovacion-mobile
          git commit -m "Generated Expo app automatically" || echo "No changes"
          git push

